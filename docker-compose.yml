version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0-alpine
    container_name: elysium-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: elysium_agent
      MYSQL_USER: elysium
      MYSQL_PASSWORD: elysium_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 3s
      retries: 5
      interval: 10s
    networks:
      - elysium-network

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elysium-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://elysium:elysium_password@db:3306/elysium_agent
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME:-Admin}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Elysium Agent}
      VITE_APP_LOGO: ${VITE_APP_LOGO}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      timeout: 3s
      retries: 5
      interval: 10s
    networks:
      - elysium-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  elysium-network:
    driver: bridge
